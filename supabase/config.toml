# Local Supabase configuration. See https://supabase.com/docs/guides/cli/config
project_id = "expensehub-v1-local"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false       # local dev only — turn ON in production

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[edge_functions]
enabled = true

[functions.expenses-submit]
verify_jwt = true

[functions.expenses-approve]
verify_jwt = true

[functions.expenses-bulk-export]
verify_jwt = true

[functions.statements-upload]
verify_jwt = true

[functions.statements-match]
verify_jwt = true
